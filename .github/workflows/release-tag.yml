name: Release Tag

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  tag:
    name: Create release tag
    if: >-
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.head.ref, 'release/v') ||
       startsWith(github.event.pull_request.head.ref, 'preview/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # A PAT is required so that the tag push triggers the Release
          # workflow.  Tags pushed with the default GITHUB_TOKEN do not
          # fire further workflow runs (GitHub security policy).
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # Strip either release/ or preview/ prefix to get the tag
          TAG="${BRANCH#release/}"
          TAG="${TAG#preview/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Extracted tag: $TAG"

      - name: Verify tag does not already exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push annotated tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Tag $TAG created and pushed. Release workflow will be triggered."
