name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      push_artifacts:
        description: "Push Docker image and create GitHub Release (only meaningful with a tag)"
        type: boolean
        default: false
      build_linux:
        description: "Build Linux platform"
        type: boolean
        default: true
      build_macos_x86_64:
        description: "Build macOS Intel"
        type: boolean
        default: true
      build_macos_arm64:
        description: "Build macOS ARM64"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows"
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  # ── Build Linux backend (split out so Docker doesn't wait for all platforms) ─
  build-linux:
    name: Backend / linux-x86_64
    if: github.event_name == 'push' || inputs.build_linux
    uses: ./.github/workflows/release-backend-linux.yml

  # ── Build C++ backend for macOS Intel ───────────────────────────────────────
  build-backend-macos-x86_64:
    name: Backend / macos-x86_64
    if: github.event_name == 'push' || inputs.build_macos_x86_64
    uses: ./.github/workflows/release-backend-macos.yml
    with:
      runner: macos-15-intel
      platform_id: macos-x86_64
      artifact_name: backend-macos-x86_64
      archive_name: backend-macos-x86_64.tar.gz
      build_parallel: 4

  # ── Build C++ backend for macOS ARM64 ───────────────────────────────────────
  build-backend-macos-arm64:
    name: Backend / macos-arm64
    if: github.event_name == 'push' || inputs.build_macos_arm64
    uses: ./.github/workflows/release-backend-macos.yml
    with:
      runner: macos-15
      platform_id: macos-arm64
      artifact_name: backend-macos-arm64
      archive_name: backend-macos-arm64.tar.gz
      build_parallel: 3

  # ── Build C++ backend for Windows ───────────────────────────────────────────
  build-backend-windows:
    name: Backend / windows-x86_64
    if: github.event_name == 'push' || inputs.build_windows
    uses: ./.github/workflows/release-backend-windows.yml

  # ── Build web frontend ──────────────────────────────────────────────────────
  build-frontend:
    name: Frontend
    uses: ./.github/workflows/release-frontend.yml

  # ── Build Electron installers ───────────────────────────────────────────────
  electron-linux-x86_64:
    name: Electron / linux-x86_64
    needs: [build-linux, build-frontend]
    uses: ./.github/workflows/release-electron.yml
    with:
      runner: ubuntu-22.04
      platform_id: linux-x86_64
      backend_artifact_name: backend-linux-x86_64
      backend_archive_name: backend-linux-x86_64.tar.gz
      electron_platform: linux
      electron_arch: x64
      backend_platform: linux

  electron-macos-x86_64:
    name: Electron / macos-x86_64
    needs: [build-backend-macos-x86_64, build-frontend]
    uses: ./.github/workflows/release-electron.yml
    with:
      runner: macos-15-intel
      platform_id: macos-x86_64
      backend_artifact_name: backend-macos-x86_64
      backend_archive_name: backend-macos-x86_64.tar.gz
      electron_platform: mac
      electron_arch: x64
      backend_platform: mac

  electron-macos-arm64:
    name: Electron / macos-arm64
    needs: [build-backend-macos-arm64, build-frontend]
    uses: ./.github/workflows/release-electron.yml
    with:
      runner: macos-15
      platform_id: macos-arm64
      backend_artifact_name: backend-macos-arm64
      backend_archive_name: backend-macos-arm64.tar.gz
      electron_platform: mac
      electron_arch: arm64
      backend_platform: mac

  electron-windows-x86_64:
    name: Electron / windows-x86_64
    needs: [build-backend-windows, build-frontend]
    uses: ./.github/workflows/release-electron.yml
    with:
      runner: windows-latest
      platform_id: windows-x86_64
      backend_artifact_name: backend-windows-x86_64
      backend_archive_name: backend-windows-x86_64.zip
      electron_platform: win
      electron_arch: x64
      backend_platform: windows

  # ── Docker image (depends only on Linux build + frontend) ───────────────────
  docker:
    name: Docker Image
    needs: [build-linux, build-frontend]
    if: >-
      always() &&
      needs.build-linux.result == 'success' &&
      needs.build-frontend.result == 'success' &&
      (github.event_name == 'push' || inputs.push_artifacts)
    uses: ./.github/workflows/release-docker.yml
    secrets: inherit

  # ── GitHub Release with native binaries ─────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-linux, build-backend-macos-x86_64, build-backend-macos-arm64, build-backend-windows, build-frontend, electron-linux-x86_64, electron-macos-x86_64, electron-macos-arm64, electron-windows-x86_64]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/release-publish.yml
    secrets: inherit
