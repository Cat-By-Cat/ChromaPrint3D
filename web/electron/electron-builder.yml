appId: com.neroued.chromaprint3d
productName: ChromaPrint3D

directories:
  output: release

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

files:
  - "dist/**/*"
  - "package.json"

extraResources:
  - from: resources/frontend-dist
    to: frontend-dist
  - from: resources/backend
    to: backend
  - from: resources/data
    to: data

asar: true

linux:
  target:
    - AppImage
  category: Utility

mac:
  target:
    - dmg

win:
  target:
    - nsis
