name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: Download models from HuggingFace
        run: ./scripts/download_models.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install OpenCV and ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopencv-dev ccache

      - name: Cache C++ build (lib3mf + core)
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-gcc13-${{ hashFiles('CMakeLists.txt', 'core/CMakeLists.txt', 'core/src/**', 'core/include/**', 'apps/CMakeLists.txt', 'apps/**', 'infer/CMakeLists.txt', 'infer/**', '3dparty/lib3mf/**', '3dparty/spdlog/CMakeLists.txt') }}
          restore-keys: |
            build-${{ runner.os }}-gcc13-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-gcc13-${{ hashFiles('CMakeLists.txt', 'core/**', 'apps/**', 'infer/**', '3dparty/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-gcc13-

      - name: Build C++
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13
          ccache -z
          cmake --build build -j$(nproc)
          ccache -s

      - name: Build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            neroued/chromaprint3d
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
