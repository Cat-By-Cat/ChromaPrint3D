name: Release Publish

on:
  workflow_call:

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p dist/
          for dir in artifacts/backend-*; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 1 -type f -exec cp {} dist/ \;
          done
          for dir in artifacts/electron-*; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 1 -type f -exec cp {} dist/ \;
          done
          cd artifacts/frontend-dist
          zip -r ../../dist/frontend-dist.zip .
          cd ../..
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
