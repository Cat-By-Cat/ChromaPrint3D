name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      push_artifacts:
        description: "Push Docker image and create GitHub Release (only meaningful with a tag)"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  # ── Build C++ backend for all platforms ────────────────────────────────────
  build-backend:
    name: Backend / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            binary: chromaprint3d_server

          - name: macos-x86_64
            os: macos-13
            binary: chromaprint3d_server

          - name: macos-arm64
            os: macos-14
            binary: chromaprint3d_server

          - name: windows-x86_64
            os: windows-latest
            binary: chromaprint3d_server.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      # ── Platform dependencies ───────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopencv-dev libpotrace-dev uuid-dev ccache

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install opencv potrace ccache

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\packages
            C:\vcpkg\installed\x64-windows
          key: vcpkg-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'web/backend/CMakeLists.txt', 'core/CMakeLists.txt') }}

      - name: Install dependencies via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install opencv4:x64-windows openssl:x64-windows zlib:x64-windows c-ares:x64-windows potrace:x64-windows

      # ── Build caches ────────────────────────────────────────────────────────
      - name: Cache ccache (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-backend-${{ matrix.name }}-${{ github.sha }}
          restore-keys: ccache-backend-${{ matrix.name }}-

      - name: Cache CMake third-party deps
        uses: actions/cache@v4
        with:
          path: |
            build/3dparty
            build/_deps
          key: deps-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'web/backend/CMakeLists.txt', '3dparty/lib3mf/CMakeLists.txt', '3dparty/spdlog/CMakeLists.txt', '3dparty/clipper2/CPP/CMakeLists.txt', 'infer/CMakeLists.txt') }}

      # ── CMake configure ─────────────────────────────────────────────────────
      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      - name: ccache stats (Linux/macOS)
        if: runner.os != 'Windows'
        run: ccache -s

      # ── Package & upload ────────────────────────────────────────────────────
      - name: Package archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p pkg
          cp build/bin/${{ matrix.binary }} pkg/
          find build/_deps/onnxruntime-src/lib \
            \( -name 'libonnxruntime*.so*' -o -name 'libonnxruntime*.dylib*' \) \
            -exec cp {} pkg/ \; 2>/dev/null || true
          tar czf backend-${{ matrix.name }}.tar.gz -C pkg .

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path pkg -Force
          Copy-Item build\bin\${{ matrix.binary }} pkg\
          Get-ChildItem build\_deps\onnxruntime-src\lib -Filter "onnxruntime*.dll" -ErrorAction SilentlyContinue |
            Copy-Item -Destination pkg\
          Compress-Archive -Path pkg\* -DestinationPath backend-${{ matrix.name }}.zip

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.name }}
          path: backend-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.name }}
          path: backend-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 7

  # ── Build web frontend ──────────────────────────────────────────────────────
  build-frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Build
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/frontend/dist/
          retention-days: 7

  # ── Docker image (Linux, tag push or manual with push_artifacts) ────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || inputs.push_artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: Download models from HuggingFace
        run: python3 scripts/download_models.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopencv-dev libpotrace-dev uuid-dev ccache

      - name: Cache CMake third-party deps
        uses: actions/cache@v4
        with:
          path: |
            build/3dparty
            build/_deps
          key: deps-linux-x86_64-${{ hashFiles('CMakeLists.txt', 'web/backend/CMakeLists.txt', '3dparty/lib3mf/CMakeLists.txt', '3dparty/spdlog/CMakeLists.txt', '3dparty/clipper2/CPP/CMakeLists.txt', 'infer/CMakeLists.txt') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-docker-linux-x86_64-${{ github.sha }}
          restore-keys: ccache-docker-linux-x86_64-

      - name: Build C++
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13
          cmake --build build --parallel
          ccache -s

      - name: Build web frontend
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            neroued/chromaprint3d
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── GitHub Release with native binaries ─────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p dist/
          # Backend archives (one file per platform sub-folder)
          find artifacts/backend-* -maxdepth 1 -type f | xargs -I{} cp {} dist/
          # Frontend zip
          cd artifacts/frontend-dist
          zip -r ../../dist/frontend-dist.zip .
          cd ../..
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
