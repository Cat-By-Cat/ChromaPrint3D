name: Release Frontend

on:
  workflow_call:

jobs:
  build-frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Lint (includes typecheck)
        working-directory: web/frontend
        run: npm run lint

      - name: Test
        working-directory: web/frontend
        run: npm run test

      - name: Build (web)
        working-directory: web/frontend
        run: npm run build

      - name: Upload frontend-dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/frontend/dist/
          retention-days: 7

      - name: Rebuild for Electron (relative asset base)
        working-directory: web/frontend
        env:
          CHROMAPRINT3D_FRONTEND_TARGET: electron
        run: npx vite build

      - name: Upload frontend-dist-electron
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-electron
          path: web/frontend/dist/
          retention-days: 7
